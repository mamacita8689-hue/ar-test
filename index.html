<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: black;
    }

    #startButton {
      position: fixed;
      z-index: 9999;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 28px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: #ff4fb3;
      color: white;
    }
  </style>
</head>

<body>

<button id="startButton">Запустить AR</button>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="unicorn"
      src="./unicorn.webm"
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
      preload="auto">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">

    <a-plane
      id="videoPlane"
      position="0 0 0.1"
      width="1"
      height="1"
      material="src: #unicorn; transparent: true; shader: flat; side: double;">
    </a-plane>

  </a-entity>

</a-scene>

<script>
  const startButton = document.querySelector("#startButton");
  const sceneEl = document.querySelector("#scene");
  const target = document.querySelector("#target");
  const video = document.querySelector("#unicorn");

  startButton.addEventListener("click", async () => {
    startButton.style.display = "none";

    try {
      await video.play();
      video.pause();
      video.currentTime = 0;
    } catch (e) {
      console.log("Первичный запуск видео не удался:", e);
    }

    const arSystem = sceneEl.systems["mindar-image-system"];
    arSystem.start();
  });

  target.addEventListener("targetFound", async () => {
    video.currentTime = 0;

    try {
      await video.play();
      console.log("Видео запущено");
    } catch (e) {
      console.log("Видео не запустилось:", e);
    }
  });

  target.addEventListener("targetLost", () => {
    video.pause();
  });
</script>

</body>
</html>
