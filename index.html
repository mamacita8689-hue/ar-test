<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #fff3fb;
      font-family: Arial, sans-serif;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #fff3fb;
      text-align: center;
    }

    #startButton {
      padding: 18px 28px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: #ff4fb3;
      color: white;
    }

    #scene {
      display: none;
    }
  </style>
</head>

<body>

<div id="startScreen">
  <h2>Оживи кабошон ✨</h2>
  <button id="startButton">Запустить AR</button>
</div>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  color-space="sRGB"
  renderer="colorManagement: true; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="unicorn"
      src="./unicorn.webm"
      muted
      loop
      playsinline
      webkit-playsinline
      preload="auto">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-plane
      position="0 0 0.1"
      width="1"
      height="1"
      material="src: #unicorn; transparent: true; shader: flat; side: double;">
    </a-plane>
  </a-entity>

</a-scene>

<script>
  const startScreen = document.querySelector("#startScreen");
  const startButton = document.querySelector("#startButton");
  const sceneEl = document.querySelector("#scene");
  const target = document.querySelector("#target");
  const video = document.querySelector("#unicorn");

  startButton.addEventListener("click", async () => {
    startScreen.style.display = "none";
    sceneEl.style.display = "block";

    try {
      await video.play();
      video.pause();
      video.currentTime = 0;
    } catch (e) {
      console.log("Видео пока не запустилось:", e);
    }

    const arSystem = sceneEl.systems["mindar-image-system"];
    arSystem.start();
  });

  target.addEventListener("targetFound", async () => {
    video.currentTime = 0;
    await video.play();
  });

  target.addEventListener("targetLost", () => {
    video.pause();
  });
</script>

</body>
</html>
